name: Gradle Test Action
description: A GitHub Action to test a gradle project

inputs:
  java-version:
    description: "Java version to use"
    required: false
    default: "21"
  java-distribution:
    description: "Java distribution to use"
    required: false
    default: "temurin"
  commands:
    description: "The gradle commands to run"
    required: false
    default: "check"
  jacoco-csv-location:
    description: "Location of Jacoco CSV report"
    required: false
    default: "./build/reports/jacoco/test/jacocoTestReport.csv"
  jacoco-xml-location:
    description: "Location of Jacoco XML report"
    required: false
    default: "./build/reports/jacoco/test/jacocoTestReport.xml"
  artifact-suffix:
    description: "Artifact suffix, useful if you run this action multiple times"
    required: false
    default: "unit"
  enable-codecov:
    description: "Set to true to upload coverage to Codecov from this test job"
    required: false
    default: "false"
  codecov-token:
    description: "Codecov token for private repos. Public repos can leave this empty."
    required: false
    default: ""
outputs:
  total-lines:
    description: "Total lines to cover with tests"
    value: ${{ steps.report-coverage.outputs.total-lines }}
  lines-covered:
    description: "Total lines covered with tests"
    value: ${{ steps.report-coverage.outputs.lines-covered }}
  coverage-percentage:
    description: "The coverage percentage"
    value: ${{ steps.report-coverage.outputs.coverage-percentage }}

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: gradle-build

    - name: "Setup Java"
      uses: actions/setup-java@v4
      with:
        distribution: ${{ inputs.java-distribution }}
        java-version: ${{ inputs.java-version }}
        cache: gradle

    - name: "Run tests"
      id: test
      shell: bash
      run: |
        ./gradlew --build-cache ${{ inputs.commands }}

    - name: "Report coverage"
      id: report-coverage
      if: ${{ !cancelled() }}
      shell: bash
      run: |
        LABEL=$(echo "${{ inputs.artifact-suffix }}" | sed 's/^./\U&/' | sed 's/-/ /g')

        if [ -f ${{ inputs.jacoco-csv-location }} ]; then
          TOTAL=$(awk -F "," '{ instructions += $4 + $5 } END { print instructions }' ${{ inputs.jacoco-csv-location }})
          COVERED=$(awk -F "," '{ covered += $5 } END { print covered }' ${{ inputs.jacoco-csv-location }})
          PERCENTAGE=$(awk -F "," '{ instructions += $4 + $5; covered += $5 } END { printf "%.2f", 100*covered/instructions }' ${{ inputs.jacoco-csv-location }})

          echo "$COVERED / $TOTAL instructions covered"
          echo "$PERCENTAGE% covered"

          echo "total-lines=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "lines-covered=$COVERED" >> "$GITHUB_OUTPUT"
          echo "coverage-percentage=$PERCENTAGE" >> "$GITHUB_OUTPUT"

          MISSED=$((TOTAL - COVERED))
          echo "## ${LABEL} Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${PERCENTAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Covered | $COVERED |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Missed | $MISSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Lines | $TOTAL |" >> $GITHUB_STEP_SUMMARY
        else
          echo -e "\e[33mJacoco CSV coverage report not found!\e[0m"
          echo "## ${LABEL} Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report not available." >> $GITHUB_STEP_SUMMARY
        fi

    - name: "Report test summary"
      if: ${{ !cancelled() }}
      uses: test-summary/action@v2
      with:
        paths: "**/test-results/**/*.xml"

    - name: "Upload coverage to Codecov"
      if: ${{ !cancelled() && inputs.enable-codecov == 'true' }}
      uses: codecov/codecov-action@v5
      with:
        files: ${{ inputs.jacoco-xml-location }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false

    - name: "Upload test artifacts"
      uses: actions/upload-artifact@master
      with:
        name: gradle-tests-${{ inputs.artifact-suffix }}
        retention-days: 2
        path: |
          **/build/jacoco/*.exec
